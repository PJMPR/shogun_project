name: Dodaj / zaktualizuj sylabus

on:
  workflow_dispatch:
    inputs:
      syllabus_json:
        description: |
          Wklej tutaj zawartość pliku JSON sylabusu (pełna zawartość pliku, nie ścieżka).
          Format: { "sylabus": { "kod_przedmiotu": "AM", "tryb_studiow": "stacjonarny", ... } }
        required: true
        type: string

permissions:
  contents: write
  actions: read

jobs:
  process-syllabus:
    runs-on: ubuntu-latest

    steps:
      - name: Turnstyle (kolejkowanie uruchomień)
        uses: softprops/turnstyle@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          poll-interval-seconds: 10
      - name: Checkout repozytorium
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
          fetch-depth: 0

      - name: Pull latest from main
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git pull --ff-only origin main


      - name: Instalacja zaleznosci (jq + TeX Live)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            jq \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-lang-polish \
            texlive-pictures \
            lmodern

      - name: Instalacja Pythona i python-docx
        run: |
          sudo apt-get install -y --no-install-recommends python3 python3-pip python3-venv
          python3 -m venv /opt/syllabus-venv
          /opt/syllabus-venv/bin/pip install --quiet python-docx

      - name: Walidacja i zapis JSON sylabusu
        id: validate
        env:
          SYLLABUS_JSON_INPUT: ${{ github.event.inputs.syllabus_json }}
        run: |
          printf '%s' "$SYLLABUS_JSON_INPUT" > /tmp/input_syllabus.json

          if ! jq -e '.sylabus' /tmp/input_syllabus.json > /dev/null 2>&1; then
            echo "BŁĄD: Nieprawidłowa struktura JSON – brak klucza 'sylabus'" >&2
            exit 1
          fi

          CODE=$(jq -r '.sylabus.kod_przedmiotu // empty' /tmp/input_syllabus.json)
          TRYB=$(jq -r '.sylabus.tryb_studiow // empty' /tmp/input_syllabus.json)

          if [[ -z "$CODE" ]]; then
            echo "BŁĄD: Brak pola sylabus.kod_przedmiotu" >&2
            exit 1
          fi
          if [[ -z "$TRYB" ]]; then
            echo "BŁĄD: Brak pola sylabus.tryb_studiow" >&2
            exit 1
          fi

          echo "syllabus_code=$CODE" >> $GITHUB_OUTPUT
          echo "syllabus_tryb=$TRYB" >> $GITHUB_OUTPUT

      - name: Przetwarzanie sylabusu (JSON → TEX → PDF + aktualizacja programu)
        run: |
          chmod +x files_generation/cicd/scripts/process-syllabus.sh
          chmod +x files_generation/cicd/scripts/generate-tex.sh
          chmod +x files_generation/cicd/scripts/compile-pdf.sh
          chmod +x files_generation/cicd/scripts/update-program-json.sh
          bash files_generation/cicd/scripts/process-syllabus.sh /tmp/input_syllabus.json

      - name: Generowanie pliku Word (JSON → DOCX)
        run: |
          CODE="${{ steps.validate.outputs.syllabus_code }}"
          cd files_generation/sylabus-word
          /opt/syllabus-venv/bin/python generate_syllabus.py "$CODE"
          cd ../..

      - name: Weryfikacja wygenerowanych plików
        run: |
          CODE="${{ steps.validate.outputs.syllabus_code }}"
          TRYB="${{ steps.validate.outputs.syllabus_tryb }}"

          if echo "$TRYB" | grep -qi "niestacjonar"; then
            JSON_PATH="frontend/public/assets/syllabusy-n/${CODE}.json"
            PDF_PATH="frontend/public/assets/files/niestacjonarne/${CODE}.pdf"
            DOC_PATH="frontend/public/assets/files/niestacjonarne/${CODE}.docx"
          else
            JSON_PATH="frontend/public/assets/syllabusy/${CODE}.json"
            PDF_PATH="frontend/public/assets/files/stacjonarne/${CODE}.pdf"
            DOC_PATH="frontend/public/assets/files/stacjonarne/${CODE}.docx"
          fi

          [[ -f "$JSON_PATH" ]] || (echo "BŁĄD: Brak JSON: $JSON_PATH" >&2; exit 1)
          [[ -f "$PDF_PATH" ]]  || (echo "BŁĄD: Brak PDF:  $PDF_PATH" >&2; exit 1)
          [[ -f "$DOC_PATH" ]]  || (echo "BŁĄD: Brak DOCX: $DOC_PATH" >&2; exit 1)

      - name: Commit i push zmian
        run: |
          CODE="${{ steps.validate.outputs.syllabus_code }}"
          TRYB="${{ steps.validate.outputs.syllabus_tryb }}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add frontend/public/assets/syllabusy/ \
                  frontend/public/assets/syllabusy-n/ \
                  frontend/public/assets/files/stacjonarne/ \
                  frontend/public/assets/files/niestacjonarne/ \
                  frontend/public/assets/program.json \
                  frontend/public/assets/niestacjonarne/program.json \
                  frontend/public/assets/electives-other.json \
                  frontend/public/assets/electives-specializations.json \
                  frontend/public/assets/niestacjonarne/electives-other.json \
                  frontend/public/assets/niestacjonarne/electives-specializations.json \
                  || true

          if git diff --cached --quiet; then
            echo "Brak zmian do zacommitowania."
          else
            git commit -m "sylabus($CODE): dodaj/zaktualizuj [$TRYB] [skip ci]"
            git push
          fi
