server {
    listen 80;
    server_name shogun.local;

    # ── Backend API ───────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://pj_syllabi_api:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Static files (syllabus PDFs, DOCX) ───────────────────────────────
    location /files/ {
        proxy_pass         http://pj_files:80/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        add_header         Access-Control-Allow-Origin *;
    }

    # ── Micro-frontends ───────────────────────────────────────────────────
    location /mfe-program/ {
        proxy_pass         http://pj_mfe_program:80/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
    }

    location /mfe-syllabi/ {
        proxy_pass         http://pj_mfe_syllabi:80/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
    }

    location /mfe-assignements/ {
        proxy_pass         http://pj_mfe_assignements:80/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
    }

    # ── Host Angular app (catch-all) ──────────────────────────────────────
    location / {
        proxy_pass         http://pj_mfe_host:80/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
